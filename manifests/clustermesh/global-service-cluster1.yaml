apiVersion: apps/v1
kind: Deployment
metadata:
  name: global-echo
  namespace: clustermesh-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: global-echo
      cluster: cilium-west
  template:
    metadata:
      labels:
        app: global-echo
        cluster: cilium-west
    spec:
      containers:
        - name: global-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-text=hello-from-cilium-west"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: global-echo
  namespace: clustermesh-demo
  annotations:
    service.cilium.io/global: "true"
spec:
  selector:
    app: global-echo
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: clustermesh-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
      cluster: cilium-west
  template:
    metadata:
      labels:
        app: client
        cluster: cilium-west
    spec:
      containers:
        - name: client
          image: curlimages/curl:8.12.1
          command:
            - /bin/sh
            - -c
            - sleep infinity
